<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tushar Srivastava | Jungle 3D Profile</title>
  <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg1: #031b12;
      --bg2: #0c2f1e;
      --bg3: #184d2f;
      --leaf: #4ef08e;
      --leaf-dark: #1d9d56;
      --gold: #ffd76a;
      --card: rgba(8, 30, 20, 0.6);
      --glass: rgba(255, 255, 255, 0.08);
      --text: #f4fff7;
      --muted: #cae8d2;
      --shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(78, 240, 142, 0.18), transparent 18%),
        radial-gradient(circle at 80% 15%, rgba(255, 215, 106, 0.12), transparent 15%),
        radial-gradient(circle at 50% 80%, rgba(39, 124, 74, 0.2), transparent 20%),
        linear-gradient(145deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      perspective: 1200px;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(115deg, transparent 0 40%, rgba(255,255,255,0.04) 50%, transparent 60%),
        radial-gradient(circle at 50% 110%, rgba(0,0,0,0.5), transparent 45%);
      mix-blend-mode: screen;
      animation: mistMove 12s linear infinite;
    }

    body::after {
      background:
        radial-gradient(circle at 10% 90%, rgba(34, 139, 34, 0.35), transparent 18%),
        radial-gradient(circle at 90% 100%, rgba(50, 205, 50, 0.22), transparent 18%),
        radial-gradient(circle at 0% 100%, rgba(0, 100, 0, 0.35), transparent 20%),
        radial-gradient(circle at 100% 100%, rgba(0, 80, 20, 0.35), transparent 20%);
      opacity: 0.9;
    }

    .scene {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transform-style: preserve-3d;
    }

    .floating-leaves span {
      position: absolute;
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, #59ff9c, #177c46);
      border-radius: 0 100% 0 100%;
      opacity: 0.22;
      filter: blur(0.4px);
      animation: leafFall linear infinite;
      box-shadow: 0 0 12px rgba(89, 255, 156, 0.25);
    }

    .floating-leaves span:nth-child(1) { left: 8%; top: -10%; animation-duration: 14s; animation-delay: 0s; }
    .floating-leaves span:nth-child(2) { left: 18%; top: -8%; animation-duration: 16s; animation-delay: 2s; }
    .floating-leaves span:nth-child(3) { left: 32%; top: -12%; animation-duration: 13s; animation-delay: 5s; }
    .floating-leaves span:nth-child(4) { left: 48%; top: -10%; animation-duration: 17s; animation-delay: 1s; }
    .floating-leaves span:nth-child(5) { left: 64%; top: -8%; animation-duration: 15s; animation-delay: 4s; }
    .floating-leaves span:nth-child(6) { left: 80%; top: -11%; animation-duration: 18s; animation-delay: 3s; }
    .floating-leaves span:nth-child(7) { left: 92%; top: -9%; animation-duration: 14s; animation-delay: 6s; }

    .profile-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 36px 28px 30px;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(15, 55, 35, 0.88), rgba(6, 22, 15, 0.92));
      border: 1px solid rgba(137, 255, 180, 0.18);
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -10px 30px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: center;
      overflow: hidden;
      transform-style: preserve-3d;
      transform: rotateX(8deg) rotateY(-8deg);
      transition: transform 0.5s ease, box-shadow 0.5s ease;
    }

    .profile-card:hover {
      transform: rotateX(2deg) rotateY(2deg) translateY(-6px);
      box-shadow:
        0 35px 60px rgba(0, 0, 0, 0.55),
        0 0 30px rgba(78, 240, 142, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .profile-card::before {
      content: "";
      position: absolute;
      inset: -30% -20% auto;
      height: 220px;
      background: radial-gradient(circle, rgba(110,255,163,0.22), transparent 60%);
      transform: translateZ(40px);
      pointer-events: none;
    }

    .profile-card::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 120px;
      background: linear-gradient(to top, rgba(57, 111, 42, 0.4), transparent);
      pointer-events: none;
    }

    .vines,
    .vines::before,
    .vines::after {
      position: absolute;
      content: "";
      width: 120px;
      height: 220px;
      border: 2px solid rgba(129, 255, 160, 0.16);
      border-color: rgba(129, 255, 160, 0.16) transparent transparent transparent;
      border-radius: 50%;
      top: -40px;
      pointer-events: none;
    }

    .vines {
      left: -25px;
      transform: rotate(10deg);
    }

    .vines::before {
      left: 310px;
      top: 10px;
      transform: rotate(-22deg);
    }

    .vines::after {
      left: 290px;
      top: 60px;
      transform: rotate(-40deg);
    }

    .image {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 20px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(135deg, #7dffac, #0d6b3c, #ffe08c);
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.03),
        0 20px 35px rgba(0,0,0,0.35),
        0 0 25px rgba(125,255,172,0.22);
      transform: translateZ(40px);
    }

    .image::after {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px dashed rgba(255, 236, 165, 0.28);
      animation: spin 16s linear infinite;
    }

    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      background: #163d2b;
    }

    .text-data {
      display: flex;
      flex-direction: column;
      gap: 8px;
      transform: translateZ(30px);
    }

    .name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-shadow: 0 3px 14px rgba(0,0,0,0.45);
    }

    .job {
      font-size: 1rem;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .tagline {
      margin: 14px auto 0;
      max-width: 300px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      transform: translateZ(24px);
    }

    .media-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin: 26px 0 22px;
      transform: translateZ(28px);
    }

    .link {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.28);
      transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .link:hover {
      transform: translateY(-6px) scale(1.08);
      box-shadow: 0 14px 25px rgba(0,0,0,0.35);
      filter: brightness(1.08);
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      transform: translateZ(34px);
    }

    .button,
    .modal-action {
      border: none;
      outline: none;
      min-width: 140px;
      padding: 13px 20px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      color: #092414;
      background: linear-gradient(135deg, #ffe08c, #7dffac);
      box-shadow: 0 12px 24px rgba(0,0,0,0.28);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .button:hover,
    .modal-action:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 28px rgba(0,0,0,0.35);
    }

    .button.secondary,
    .modal-action.secondary {
      background: linear-gradient(135deg, #194d31, #2b7a4d);
      color: #effff4;
      border: 1px solid rgba(145,255,187,0.2);
    }

    section {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: 0.35s ease;
      z-index: 20;
      padding: 20px;
    }

    section.active {
      opacity: 1;
      visibility: visible;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(1, 10, 7, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .modal-box {
      position: relative;
      width: 100%;
      max-width: 390px;
      padding: 28px 24px 24px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(13, 46, 30, 0.96), rgba(4, 18, 12, 0.98));
      border: 1px solid rgba(125,255,172,0.18);
      text-align: center;
      box-shadow: 0 28px 60px rgba(0,0,0,0.45);
      transform: scale(0.9) translateY(20px);
      transition: 0.35s ease;
      z-index: 2;
    }

    section.active .modal-box {
      transform: scale(1) translateY(0);
    }

    .qr-image {
      width: 210px;
      height: 210px;
      object-fit: contain;
      background: #fff;
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 16px 30px rgba(0,0,0,0.28);
      margin-bottom: 18px;
    }

    .modal-box h2 {
      font-size: 1.35rem;
      margin-bottom: 8px;
      color: #f8fff9;
    }

    .modal-box h3 {
      font-size: 0.98rem;
      font-weight: 500;
      color: #cde8d4;
      margin-bottom: 18px;
    }

    .modal-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ground-shadow {
      position: absolute;
      width: 440px;
      height: 90px;
      bottom: calc(50% - 220px);
      left: 50%;
      transform: translateX(-50%) translateZ(-80px);
      background: radial-gradient(circle, rgba(0, 0, 0, 0.45), transparent 70%);
      filter: blur(18px);
      pointer-events: none;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes leafFall {
      0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.22; }
      50% { transform: translate3d(30px, 45vh, 0) rotate(160deg); }
      100% { transform: translate3d(-20px, 110vh, 0) rotate(320deg); opacity: 0; }
    }

    @keyframes mistMove {
      0% { transform: translateX(-3%); }
      50% { transform: translateX(3%); }
      100% { transform: translateX(-3%); }
    }

    @media (max-width: 520px) {
      .profile-card {
        max-width: 100%;
        padding: 30px 20px 24px;
        transform: none;
      }

      .name {
        font-size: 1.7rem;
      }

      .image {
        width: 135px;
        height: 135px;
      }

      .ground-shadow {
        width: 300px;
        bottom: calc(50% - 235px);
      }
    }
  </style>
</head>
<body>
  <div class="floating-leaves">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="scene">
    <div class="ground-shadow"></div>

    <div class="profile-card">
      <div class="vines"></div>

      <div class="image">
        <img src="assets/images/favicon.jpg" alt="Tushar Srivastava" class="profile-img" />
      </div>

      <div class="text-data">
        <span class="name">Tushar Srivastava</span>
        <span class="job">DevOps Engineer</span>
      </div>

      <p class="tagline">
        Building modern cloud journeys with a bold jungle-inspired digital identity.
      </p>

      <div class="media-buttons">
        <a href="https://www.facebook.com/tusharrbl" style="background: #4267b2" class="link" target="_blank">
          <i class="bx bxl-facebook"></i>
        </a>
        <a href="https://www.twitter.com/tushar_rbl" style="background: #1da1f2" class="link" target="_blank">
          <i class="bx bxl-twitter"></i>
        </a>
        <a href="https://www.instagram.com/kshitiz_tushar" style="background: #e1306c" class="link" target="_blank">
          <i class="bx bxl-instagram"></i>
        </a>
        <a href="https://www.youtube.com/@TryKaro2024" style="background: #ff0000" class="link" target="_blank">
          <i class="bx bxl-youtube"></i>
        </a>
      </div>

      <div class="buttons">
        <button class="button" onclick="location.href='index.html'">Home</button>
        <button class="button secondary show-modal">Show QR Code</button>
      </div>
    </div>
  </div>

  <section>
    <span class="overlay"></span>
    <div class="modal-box">
      <img src="./assets/images/tsQR.png" alt="QR Code" class="qr-image" />
      <h2>Hey, Open Scanner App !!</h2>
      <h3>Tushar Srivastava vCard</h3>
      <div class="modal-buttons">
        <button class="modal-action secondary close-btn">Back</button>
        <a href="./assets/images/tsQR.png" download>
          <button type="button" class="modal-action">Download QR Code</button>
        </a>
      </div>
    </div>
  </section>

  <script>
    const section = document.querySelector("section");
    const overlay = document.querySelector(".overlay");
    const showBtn = document.querySelector(".show-modal");
    const closeBtn = document.querySelector(".close-btn");
    const card = document.querySelector(".profile-card");

    showBtn.addEventListener("click", () => section.classList.add("active"));
    overlay.addEventListener("click", () => section.classList.remove("active"));
    closeBtn.addEventListener("click", () => section.classList.remove("active"));

    document.addEventListener("mousemove", (e) => {
      const x = (window.innerWidth / 2 - e.clientX) / 35;
      const y = (window.innerHeight / 2 - e.clientY) / 35;
      if (window.innerWidth > 768) {
        card.style.transform = `rotateY(${-x}deg) rotateX(${y}deg) translateY(-4px)`;
      }
    });

    document.addEventListener("mouseleave", () => {
      if (window.innerWidth > 768) {
        card.style.transform = "rotateX(8deg) rotateY(-8deg)";
      }
    });
  </script>
</body>
</html>
